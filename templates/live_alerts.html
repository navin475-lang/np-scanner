<table border="1">
    <tr>
        <th>Stock</th>
        <th>Signal</th>
        <th>Price</th>
        <th>RSI</th>
        <th>Score</th>
        <th>Time</th>
    </tr>

    {% for row in alerts %}
    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
        <td>{{ row[7] }}</td>
    </tr>
    {% endfor %}
</table>
